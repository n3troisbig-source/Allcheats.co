<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#8b0000" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Red glow orb top center -->
  <circle cx="600" cy="80" r="200" fill="#8b0000" fill-opacity="0.12"/>
  <circle cx="600" cy="80" r="120" fill="#cc0000" fill-opacity="0.08"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#redGlow)"/>

  <!-- Bottom red accent bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#redGlow)"/>

  <!-- Left side accent -->
  <rect x="0" y="0" width="4" height="630" fill="url(#redGlow)"/>

  <!-- Right side accent -->
  <rect x="1196" y="0" width="4" height="630" fill="url(#redGlow)"/>

  <!-- Corner decorations top-left -->
  <rect x="20" y="20" width="60" height="3" fill="#8b0000" opacity="0.8"/>
  <rect x="20" y="20" width="3" height="60" fill="#8b0000" opacity="0.8"/>

  <!-- Corner decorations top-right -->
  <rect x="1120" y="20" width="60" height="3" fill="#8b0000" opacity="0.8"/>
  <rect x="1177" y="20" width="3" height="60" fill="#8b0000" opacity="0.8"/>

  <!-- Corner decorations bottom-left -->
  <rect x="20" y="607" width="60" height="3" fill="#8b0000" opacity="0.8"/>
  <rect x="20" y="550" width="3" height="60" fill="#8b0000" opacity="0.8"/>

  <!-- Corner decorations bottom-right -->
  <rect x="1120" y="607" width="60" height="3" fill="#8b0000" opacity="0.8"/>
  <rect x="1177" y="550" width="3" height="60" fill="#8b0000" opacity="0.8"/>

  <!-- LIVE badge -->
  <rect x="540" y="140" width="120" height="32" rx="16" fill="#8b0000" opacity="0.9"/>
  <circle cx="558" cy="156" r="5" fill="#ff4444"/>
  <text x="600" y="162" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">LIVE</text>

  <!-- Main title ALLCHEATS -->
  <text x="600" y="270" font-family="Arial Black, Arial, sans-serif" font-size="110" font-weight="900" fill="#cc0000" text-anchor="middle" filter="url(#textGlow)" letter-spacing="-2">ALLCHEATS</text>

  <!-- .co -->
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="#888888" text-anchor="middle" letter-spacing="8">.CO</text>

  <!-- Divider line -->
  <rect x="350" y="355" width="500" height="2" fill="url(#redGlow)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="26" font-weight="400" fill="#cccccc" text-anchor="middle" letter-spacing="1">Premium AI Gaming Tools &amp; Accounts</text>

  <!-- Product pills -->
  <!-- AI Aimbot pill -->
  <rect x="155" y="450" width="190" height="44" rx="22" fill="#1a0000" stroke="#8b0000" stroke-width="1.5"/>
  <text x="250" y="477" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cc0000" text-anchor="middle">🎯 AI Aimbot</text>

  <!-- Visual ESP pill -->
  <rect x="365" y="450" width="190" height="44" rx="22" fill="#1a0000" stroke="#8b0000" stroke-width="1.5"/>
  <text x="460" y="477" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cc0000" text-anchor="middle">👁 Visual ESP</text>

  <!-- Acc Gen pill -->
  <rect x="575" y="450" width="190" height="44" rx="22" fill="#1a0000" stroke="#8b0000" stroke-width="1.5"/>
  <text x="670" y="477" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cc0000" text-anchor="middle">⚡ Acc Gen</text>

  <!-- RCS pill -->
  <rect x="785" y="450" width="190" height="44" rx="22" fill="#1a0000" stroke="#8b0000" stroke-width="1.5"/>
  <text x="880" y="477" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cc0000" text-anchor="middle">🎮 RCS</text>

  <!-- Starting price badge -->
  <rect x="470" y="515" width="260" height="50" rx="8" fill="#8b0000" opacity="0.3" stroke="#8b0000" stroke-width="1"/>
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Starting from $2.00 · Pay via CashApp</text>

  <!-- Owners bottom -->
  <text x="600" y="610" font-family="Arial, sans-serif" font-size="13" fill="#555555" text-anchor="middle" letter-spacing="2">OWNED BY REDXVK · ROYKU · DEATH</text>
</svg>
